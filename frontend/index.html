<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Create group speed dating schedules with customizable settings"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />

    <title>Group Speeddates Creator</title>

    <style>
      :root {
        --spacing: 1rem;
      }

      .results {
        margin-top: var(--spacing);
        padding: var(--spacing);
        border-radius: var(--border-radius);
        background-color: var(--b2);
        display: none;
      }

      .results.show {
        display: block;
      }

      .error {
        color: var(--red);
        font-size: 0.875rem;
        margin-top: 0.25rem;
        display: none;
      }

      .error.show {
        display: block;
      }

      .group-card {
        margin-bottom: var(--spacing);
        padding: var(--spacing);
        background-color: var(--card-background-color);
        border-radius: var(--border-radius);
      }

      .participant-tag {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        margin: 0.125rem;
        background-color: var(--primary);
        color: white;
        border-radius: 4px;
        font-size: 0.875rem;
      }

      @media (max-width: 480px) {
        .container {
          padding: var(--spacing);
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <header>
        <h1>⚡ Group Speeddates Creator</h1>
        <p>Create fair rotation schedules for speed dating events</p>
      </header>

      <section>
        <form id="speeddate-form" novalidate>
          <div class="grid">
            <div>
              <label for="people-list">
                Participants
                <small>(One per line)</small>
              </label>
              <textarea
                id="people-list"
                name="people-list"
                rows="6"
                placeholder="Alice&#10;Bob&#10;Charlie&#10;Diana"
                aria-describedby="people-hint"
              ></textarea>
              <small id="people-hint" class="secondary"
                >Enter names, emails, or IDs — one per line</small
              >
              <span id="people-error" class="error" role="alert"></span>
            </div>

            <div>
              <label for="group-size">Group Size</label>
              <input
                id="group-size"
                type="number"
                min="2"
                max="20"
                value="4"
                aria-describedby="group-hint"
              />
              <small id="group-hint" class="secondary"
                >Participants per group (2-20)</small
              >
              <span id="group-error" class="error" role="alert"></span>

              <label for="rounds" style="margin-top: 1rem"
                >Number of Rounds</label
              >
              <input
                id="rounds"
                type="number"
                min="1"
                max="10"
                value="3"
                aria-describedby="rounds-hint"
              />
              <small id="rounds-hint" class="secondary"
                >How many rotation rounds</small
              >
              <span id="rounds-error" class="error" role="alert"></span>
            </div>
          </div>

          <button type="submit" class="contrast">Generate Schedule</button>
          <button type="reset" class="secondary">Clear</button>
        </form>
      </section>

      <section id="results-section" class="results" aria-live="polite">
        <h2>📋 Your Speed Dating Schedule</h2>
        <div id="schedule-output"></div>
        <button id="print-btn" class="outline" style="margin-top: 1rem">
          Print Schedule
        </button>
        <button id="copy-btn" class="outline" style="margin-top: 0.5rem">
          Copy to Clipboard
        </button>
      </section>
    </main>

    <script>
      const form = document.getElementById("speeddate-form");
      const resultsSection = document.getElementById("results-section");
      const scheduleOutput = document.getElementById("schedule-output");
      const printBtn = document.getElementById("print-btn");
      const copyBtn = document.getElementById("copy-btn");

      // Validation
      function validateForm() {
        const peopleList = document.getElementById("people-list").value.trim();
        const groupSize = parseInt(document.getElementById("group-size").value);
        const rounds = parseInt(document.getElementById("rounds").value);

        let isValid = true;

        // People validation
        const people = peopleList.split("\n").filter((p) => p.trim());
        const peopleError = document.getElementById("people-error");
        if (people.length < 2) {
          peopleError.textContent = "Please enter at least 2 participants";
          peopleError.classList.add("show");
          isValid = false;
        } else if (people.length < groupSize) {
          peopleError.textContent = `Need at least ${groupSize} participants for this group size`;
          peopleError.classList.add("show");
          isValid = false;
        } else {
          peopleError.classList.remove("show");
        }

        // Group size validation
        const groupError = document.getElementById("group-error");
        if (groupSize < 2 || groupSize > 20) {
          groupError.textContent = "Group size must be between 2 and 20";
          groupError.classList.add("show");
          isValid = false;
        } else {
          groupError.classList.remove("show");
        }

        // Rounds validation
        const roundsError = document.getElementById("rounds-error");
        if (rounds < 1 || rounds > 10) {
          roundsError.textContent = "Rounds must be between 1 and 10";
          roundsError.classList.add("show");
          isValid = false;
        } else {
          roundsError.classList.remove("show");
        }

        return { isValid, people, groupSize, rounds };
      }

      // Generate schedule algorithm
      function generateSchedule(people, groupSize, rounds) {
        const schedule = [];
        const totalGroups = Math.ceil(people.length / groupSize);

        for (let round = 1; round <= rounds; round++) {
          const groups = [];
          const shuffled = [...people].sort(() => Math.random() - 0.5);

          for (let i = 0; i < shuffled.length; i += groupSize) {
            groups.push(shuffled.slice(i, i + groupSize));
          }

          schedule.push({ round, groups });
        }

        return schedule;
      }

      // Display results
      function displayResults(schedule) {
        scheduleOutput.innerHTML = "";

        schedule.forEach(({ round, groups }) => {
          const roundDiv = document.createElement("div");
          roundDiv.className = "group-card";

          const roundHeader = document.createElement("h3");
          roundHeader.textContent = `Round ${round}`;
          roundDiv.appendChild(roundHeader);

          groups.forEach((group, idx) => {
            const groupDiv = document.createElement("div");
            groupDiv.style.marginBottom = "0.5rem";

            const groupLabel = document.createElement("strong");
            groupLabel.textContent = `Group ${idx + 1}: `;
            groupDiv.appendChild(groupLabel);

            group.forEach((person) => {
              const tag = document.createElement("span");
              tag.className = "participant-tag";
              tag.textContent = person.trim();
              groupDiv.appendChild(tag);
            });

            roundDiv.appendChild(groupDiv);
          });

          scheduleOutput.appendChild(roundDiv);
        });

        resultsSection.classList.add("show");
      }

      // Form submission
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const { isValid, people, groupSize, rounds } = validateForm();

        if (!isValid) return;

        try {
          const schedule = generateSchedule(people, groupSize, rounds);
          displayResults(schedule);

          // Scroll to results
          resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
        } catch (error) {
          alert(
            "An error occurred while generating the schedule. Please try again."
          );
          console.error(error);
        }
      });

      // Print functionality
      printBtn.addEventListener("click", () => {
        window.print();
      });

      // Copy to clipboard
      copyBtn.addEventListener("click", async () => {
        const text = scheduleOutput.innerText;
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = "✓ Copied!";
          setTimeout(() => {
            copyBtn.textContent = "Copy to Clipboard";
          }, 2000);
        } catch (err) {
          alert("Failed to copy to clipboard");
        }
      });

      // Clear button enhancement
      form.addEventListener("reset", () => {
        resultsSection.classList.remove("show");
        document
          .querySelectorAll(".error")
          .forEach((el) => el.classList.remove("show"));
      });
    </script>
  </body>
</html>
